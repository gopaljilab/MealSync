kind = "web"
previewPath = "/"
title = "MealSync"
version = "1.0.0"
id = "artifacts/mealsync"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20855

[services.development]
run = "pnpm --filter @workspace/mealsync run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mealsync", "run", "build" ]
publicDir = "artifacts/mealsync/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20855"
BASE_PATH = "/"
